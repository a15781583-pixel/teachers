<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生徒診断ツール</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ヘッダー -->
  <header class="header">
    <div class="header-left">
      <i class="ti ti-book-2"></i>
      <span class="header-title">生徒診断ツール</span>
    </div>
    <div class="header-right">
      <label for="api-key">APIキー</label>
      <input type="password" id="api-key" placeholder="AIza..." />
    </div>
  </header>

  <!-- メインレイアウト -->
  <main class="layout">

    <!-- 左パネル：入力フォーム -->
    <section class="panel" id="form-panel">

      <h2 class="sec-title">基本情報</h2>

      <div class="field">
        <label for="f-name">生徒名</label>
        <input type="text" id="f-name" placeholder="例：田中 太郎">
      </div>

      <div class="field">
        <label for="f-grade">学年</label>
        <select id="f-grade">
          <option value="">選択してください</option>
          <optgroup label="小学生">
            <option>小学1年</option>
            <option>小学2年</option>
            <option>小学3年</option>
            <option>小学4年</option>
            <option>小学5年</option>
            <option>小学6年</option>
          </optgroup>
          <optgroup label="中学生">
            <option>中学1年</option>
            <option>中学2年</option>
            <option>中学3年</option>
          </optgroup>
          <optgroup label="高校生">
            <option>高校1年</option>
            <option>高校2年</option>
            <option>高校3年</option>
          </optgroup>
        </select>
      </div>

      <div class="field">
        <label for="f-period">在籍期間</label>
        <input type="text" id="f-period" placeholder="例：6ヶ月">
      </div>

      <div class="field">
        <label>担当科目（複数選択可）</label>
        <div class="chip-group" id="subjects">
          <button class="chip" data-val="国語">国語</button>
          <button class="chip" data-val="算数/数学">算数/数学</button>
          <button class="chip" data-val="英語">英語</button>
          <button class="chip" data-val="理科">理科</button>
          <button class="chip" data-val="社会">社会</button>
          <button class="chip" data-val="その他">その他</button>
        </div>
      </div>

      <h2 class="sec-title">学習状況</h2>

      <div class="field">
        <label for="f-scores">最近のテスト結果・成績</label>
        <textarea id="f-scores" placeholder="例：数学 75点、英語 82点（定期テスト）"></textarea>
      </div>

      <div class="field">
        <label for="f-hw">宿題の提出率</label>
        <select id="f-hw">
          <option value="">選択してください</option>
          <option>ほぼ100%（毎回提出）</option>
          <option>80%程度（たまに忘れる）</option>
          <option>50%程度（半分くらい）</option>
          <option>30%以下（あまり出さない）</option>
        </select>
      </div>

      <div class="field">
        <label for="f-comp">授業の理解度</label>
        <select id="f-comp">
          <option value="">選択してください</option>
          <option>とてもよく理解できている</option>
          <option>おおむね理解できている</option>
          <option>半分程度理解できている</option>
          <option>あまり理解できていない</option>
          <option>ほとんど理解できていない</option>
        </select>
      </div>

      <div class="field">
        <label for="f-attend">出席率</label>
        <select id="f-attend">
          <option value="">選択してください</option>
          <option>ほぼ100%</option>
          <option>80%程度</option>
          <option>60%程度</option>
          <option>50%以下</option>
        </select>
      </div>

      <h2 class="sec-title">学習態度・習慣</h2>

      <div class="field">
        <label for="f-attitude">授業態度</label>
        <select id="f-attitude">
          <option value="">選択してください</option>
          <option>積極的・意欲的</option>
          <option>真面目・おとなしい</option>
          <option>普通</option>
          <option>集中力が続かない</option>
          <option>やる気が見られない</option>
        </select>
      </div>

      <div class="field">
        <label for="f-study">週の自習時間</label>
        <select id="f-study">
          <option value="">選択してください</option>
          <option>10時間以上</option>
          <option>5〜10時間</option>
          <option>3〜5時間</option>
          <option>1〜3時間</option>
          <option>ほとんどしていない</option>
        </select>
      </div>

      <div class="field">
        <label for="f-conc">集中力</label>
        <select id="f-conc">
          <option value="">選択してください</option>
          <option>非常に高い</option>
          <option>高い</option>
          <option>普通</option>
          <option>やや低い</option>
          <option>低い</option>
        </select>
      </div>

      <h2 class="sec-title">目標・課題・メモ</h2>

      <div class="field">
        <label for="f-goal">目標（志望校・検定など）</label>
        <input type="text" id="f-goal" placeholder="例：○○高校合格、英検3級取得">
      </div>

      <div class="field">
        <label for="f-concerns">現在の課題・悩み</label>
        <textarea id="f-concerns" placeholder="例：文章題が苦手、英語の読解に時間がかかる"></textarea>
      </div>

      <div class="field">
        <label for="f-parent">保護者からのコメント</label>
        <textarea id="f-parent" placeholder="例：家での勉強習慣をつけてほしい"></textarea>
      </div>

      <div class="field">
        <label for="f-notes">講師メモ（自由記述）</label>
        <textarea id="f-notes" style="min-height: 80px;"
          placeholder="例：計算は速いが見直しをしない癖がある。先週から元気がない様子。"></textarea>
      </div>

      <button class="gen-btn" id="gen-btn">
        <i class="ti ti-sparkles"></i> AI診断レポートを生成する
      </button>

    </section>

    <!-- 右パネル：診断結果 -->
    <section class="panel" id="result-panel">

      <!-- 初期状態 -->
      <div class="state" id="state-empty">
        <i class="ti ti-clipboard-text icon-lg"></i>
        <p class="state-title">診断結果がここに表示されます</p>
        <p class="state-sub">左のフォームに入力して「AI診断レポートを生成する」を押してください</p>
      </div>

      <!-- ローディング -->
      <div class="state" id="state-loading" style="display: none;">
        <div class="dots">
          <span></span><span></span><span></span>
        </div>
        <p class="state-title">AIが分析中です...</p>
        <p class="state-sub">しばらくお待ちください</p>
      </div>

      <!-- エラー -->
      <div id="state-error" style="display: none;"></div>

      <!-- 診断結果 -->
      <div id="state-result" style="display: none;"></div>

    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
