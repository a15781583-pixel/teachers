<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生徒診断ツール</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ヘッダー -->
  <header class="header">
    <div class="header-left">
      <i class="ti ti-book-2"></i>
      <span class="header-title">生徒診断ツール</span>
    </div>
    <div class="header-right">
      <div class="api-key-group">
        <div class="api-key-top">
          <label for="api-key">APIキー</label>
          <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer" class="api-key-link">
            <i class="ti ti-external-link"></i> APIキーはこちらから
          </a>
        </div>
        <input type="password" id="api-key" placeholder="AIza..." />
      </div>
    </div>
  </header>

  <!-- タブバー -->
  <nav class="tab-bar">
    <div class="tab-list" id="tab-list"></div>
    <button class="tab-add-btn" id="tab-add-btn" title="生徒を追加">
      <i class="ti ti-user-plus"></i>
      <span>生徒を追加</span>
    </button>
  </nav>

  <!-- メインレイアウト -->
  <main class="layout">

    <!-- 左パネル：入力フォーム -->
    <section class="panel" id="form-panel">

      <h2 class="sec-title">基本情報</h2>

      <div class="field">
        <label for="f-name">生徒名</label>
        <input type="text" id="f-name" placeholder="例：田中 太郎">
      </div>

      <div class="field">
        <label for="f-grade">学年</label>
        <select id="f-grade">
          <option value="">選択してください</option>
          <optgroup label="小学生">
            <option>小学1年</option>
            <option>小学2年</option>
            <option>小学3年</option>
            <option>小学4年</option>
            <option>小学5年</option>
            <option>小学6年</option>
          </optgroup>
          <optgroup label="中学生">
            <option>中学1年</option>
            <option>中学2年</option>
            <option>中学3年</option>
          </optgroup>
          <optgroup label="高校生">
            <option>高校1年</option>
            <option>高校2年</option>
            <option>高校3年</option>
          </optgroup>
        </select>
      </div>

      <div class="field">
        <label for="f-period">在籍期間</label>
        <input type="text" id="f-period" placeholder="例：6ヶ月">
      </div>

      <div class="field">
        <label>担当科目（複数選択可）</label>
        <div class="chip-group" id="subjects">
          <button class="chip" data-val="国語">国語</button>
          <button class="chip" data-val="算数/数学">算数/数学</button>
          <button class="chip" data-val="英語">英語</button>
          <button class="chip" data-val="理科">理科</button>
          <button class="chip" data-val="社会">社会</button>
          <button class="chip" data-val="その他">その他</button>
        </div>
      </div>

      <h2 class="sec-title">学習状況</h2>

      <!-- テスト結果セクション -->
      <div class="field">
        <label>テスト結果</label>
        <div id="test-list">
          <!-- JS が動的に生成 -->
        </div>
        <button type="button" class="test-add-btn" id="test-add-btn">
          <i class="ti ti-plus"></i> テストを追加
        </button>
      </div>

      <div class="field">
        <label>授業の理解度（10段階）</label>
        <div class="scale-row">
          <span class="scale-edge-label">理解不足</span>
          <div class="scale-group" id="comp-scale">
            <button class="scale-btn" data-val="1">1</button>
            <button class="scale-btn" data-val="2">2</button>
            <button class="scale-btn" data-val="3">3</button>
            <button class="scale-btn" data-val="4">4</button>
            <button class="scale-btn" data-val="5">5</button>
            <button class="scale-btn" data-val="6">6</button>
            <button class="scale-btn" data-val="7">7</button>
            <button class="scale-btn" data-val="8">8</button>
            <button class="scale-btn" data-val="9">9</button>
            <button class="scale-btn" data-val="10">10</button>
          </div>
          <span class="scale-edge-label">完全理解</span>
        </div>
        <input type="hidden" id="f-comp" value="">
      </div>

      <h2 class="sec-title">学習態度・習慣</h2>

      <div class="field">
        <label for="f-attitude">学習態度・自習状況（講師所見）</label>
        <textarea id="f-attitude" style="min-height: 80px;"
          placeholder="例：授業中の集中力は高いが家での自習が少ない。週2〜3回は自習に来ている。積極的に質問するようになってきた。"></textarea>
      </div>

      <h2 class="sec-title">目標・課題・メモ</h2>

      <div class="field">
        <label for="f-goal">目標（志望校・検定など）</label>
        <input type="text" id="f-goal" placeholder="例：○○高校合格、英検3級取得">
      </div>

      <div class="field">
        <label for="f-concerns">現在の課題・悩み</label>
        <textarea id="f-concerns" placeholder="例：文章題が苦手、英語の読解に時間がかかる"></textarea>
      </div>

      <div class="field">
        <label for="f-notes">講師メモ（自由記述）</label>
        <textarea id="f-notes" style="min-height: 80px;"
          placeholder="例：計算は速いが見直しをしない癖がある。先週から元気がない様子。"></textarea>
      </div>

      <button class="gen-btn" id="gen-btn">
        <i class="ti ti-sparkles"></i> AI診断レポートを生成する
      </button>

    </section>

    <!-- 右パネル：診断結果 -->
    <section class="panel" id="result-panel">

      <!-- 初期状態 -->
      <div class="state" id="state-empty">
        <i class="ti ti-clipboard-text icon-lg"></i>
        <p class="state-title">診断結果がここに表示されます</p>
        <p class="state-sub">左のフォームに入力して「AI診断レポートを生成する」を押してください</p>
      </div>

      <!-- ローディング -->
      <div class="state" id="state-loading" style="display: none;">
        <div class="dots">
          <span></span><span></span><span></span>
        </div>
        <p class="state-title">AIが分析中です...</p>
        <p class="state-sub">しばらくお待ちください</p>
      </div>

      <!-- エラー -->
      <div id="state-error" style="display: none;"></div>

      <!-- 診断結果 -->
      <div id="state-result" style="display: none;"></div>

    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
